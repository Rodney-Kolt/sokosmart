<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="theme-color" content="#0A0E14" />
    <title>Sokoni Smart – Your Local Marketplace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <style>
      /* Pre-React loading state — prevents pure white flash */
      body { margin: 0; background: #0A0E14; font-family: Inter, system-ui, sans-serif; }
      #pre-loader {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; background: #0A0E14; z-index: 9999;
      }
      #pre-loader .logo {
        width: 80px; height: 80px; background: linear-gradient(135deg, #f97316, #ef4444);
        border-radius: 20px; display: flex; align-items: center; justify-content: center;
        font-size: 40px; margin-bottom: 20px;
        box-shadow: 0 0 40px rgba(249,115,22,0.3);
      }
      #pre-loader p { color: #94a3b8; font-size: 14px; margin: 0; }
      #pre-loader .dots { display: flex; gap: 6px; margin-top: 16px; }
      #pre-loader .dot {
        width: 8px; height: 8px; border-radius: 50%; background: #f97316;
        animation: bounce 1.2s infinite ease-in-out;
      }
      #pre-loader .dot:nth-child(2) { animation-delay: 0.15s; }
      #pre-loader .dot:nth-child(3) { animation-delay: 0.3s; }
      @keyframes bounce {
        0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
        30% { transform: translateY(-8px); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <!-- Shown before React mounts — React removes this automatically -->
    <div id="pre-loader">
      <div class="logo">🛍️</div>
      <p>Sokoni Smart</p>
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Remove pre-loader once React has mounted
      document.addEventListener("DOMContentLoaded", function() {
        var observer = new MutationObserver(function() {
          var root = document.getElementById("root");
          if (root && root.children.length > 0) {
            var loader = document.getElementById("pre-loader");
            if (loader) loader.style.display = "none";
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById("root"), { childList: true });
      });
    </script>
  </body>
</html>
